<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale = 1.0, user-scalable = 0">
	<title>Candy</title>
	<link rel="stylesheet" href="css/style.css">
	<link rel="icon" href="img/fav-icon.webp">
</head>
<body>
	<div class="main-block">
		<div class="nav">
			<div class="about no-focus">
				Отзывы
			</div>
			<div class="logo no-focus">
				Candy
			</div>

			<div class="burger">
				<div class="burger__line"></div>
				<div class="burger__line"></div>
				<div class="burger__line"></div>
			</div>
			<div class="bascet">
				<div class="bascet__list">
						<div class="bascet__list_forbut">

							<!--Блок-->


							

							<!--Блок-->


							<div class="bascet__button form no-focus">Оформить заказ</div>
						</div>
					</div>
				<div class="bascet__circle">
					<img src="img/bascet.webp" alt="" class="bascet_img no-focus">
				</div>
			</div>
		</div>
		<div class="parts">
			<div class="left-part no-focus">
			<div class="categ">
				<div class="categ__title no-focus">Фильтры</div>
					<div class="price">
					<div class="price__title no-focus">Стоимость</div>
					<div class="price__polzunok slidecontainer">
						<input type="range" min='1000' max='10000' step='100' oninput="priceMax()" class='slider' value="10000">
						<p class="current-max-price no-focus">10000</p>
					</div>
				</div>
				<div class="categories categories_1">
					<div class="cat">
						<div class="cat__title price__title no-focus">Категории</div>
						<div class="cat__list no-focus">
							<p class="cat__list_p"><img src="img/categories/child.webp" alt="">

								<input id="-1" type="checkbox" style="margin-right: -10%;" class="checkbox" value="child">

							Детское</p>
							<p class="cat__list_p"><img src="img/categories/man.webp" alt="">

								<input id="-2" type="checkbox"  style="margin-right: -10%;" class="checkbox" value="man">

							Мужское</p>
							<p class="cat__list_p"><img src="img/categories/whoman.webp" alt="">

								<input id="-3" type="checkbox"  style="margin-right: -10%;" class="checkbox" value="whoman">

							Женское</p>
							<p class="cat__list_p"><img src="img/categories/acses.webp" alt="">

								<input id="-4" type="checkbox"  style="margin-right: -10%;" class="checkbox" value="acses">

							Аксессуары</p>
							<p class="cat__list_p"><img src="img/categories/shoe.webp" alt="">

								<input id="-5" type="checkbox"   style="margin-right: -10%;" class="checkbox" value="shoe">

							Обувь</p>
						</div>
					</div>
				</div>
				<div class="categories categories_2 no-focus">
					<div class="cat">
						<div class="cat__title price__title">Сезон</div>
						<div class="cat__list">
							<p class="cat__list_p"><img src="img/categories/winter.webp" alt="">

								<input id="-6" type="checkbox" value="winter" style="margin-right: -10%;" class="checkbox">Зима

							</p>
							<p class="cat__list_p"><img src="img/categories/summer.webp" alt="">

								<input id="-7" type="checkbox" value="summer" style="margin-right: -10%;" class="checkbox">Лето

							</p>
							<p class="cat__list_p"><img src="img/categories/spring.webp" alt="">

								<input id="-8" type="checkbox" value="spring" style="margin-right: -10%;" class="checkbox">Демисезон

							</p>
						</div>
					</div>
				</div>
			</div>
			<div class="cat-buttom no-focus">CONTENTING</div>
			<div class="cat-button_2"></div>
			<div class="cat-button no-focus">ПРИМЕНИТЬ</div>
		</div>
		<div class="right-part">
			<div class="obl-search">
				<div class="obl-search__container">
					<div class="searching search">
						<img src="img/search.png" alt="" class="no-focus lupa">
						<input type="search" class="lupe">
					</div>
				</div>
			</div>
			<div class="products-obl">
				<div class="products" id="products">
					<p id="new_prod"></p>
				 	
				</div>	<!--Продукт добавлять строчкой выше-->
			</div>
		</div>
		</div>
	</div>
	<script type="text/javascript" src="js/system.js"></script>
</body>
</html>
