<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale = 1.0, user-scalable = 0">
	<title>Candy</title>
	<link rel="stylesheet" href="css/product.css">
	<link rel="icon" href="img/fav-icon.webp">
</head>
<body>
	<div class="main-block">
		<div class="nav">
			<div class="logo no-focus">
				Candy
			</div>
		</div>
		<div class="content">
			<div class="upper-block">
				<div class="doubleblock">
					<div class="upper-block__img">
						<img src="img/items/0.webp" alt="" class="upper-block__img_img">
					</div>
					<div class="colors"></div>
				</div>
				<div class="upper-block__text">
					<div class="upper-block__text__title"></div>
					<div class="upper-block__text__description"></div>
					<div class="categories"></div>
					<div class="costs">
						<div class="upper-block__text__cost">
						</div>
						<div class="lis">
							<p>Размер:</p>
							<select class="list">
							</select>
						</div>
					</div>

				
					<div class="button">
						<div class="first-part">ДОБАВИТЬ В КОРЗИНУ</div>
						<div class="second-part">В КОРЗИНЕ</div>
					</div>
				</div>
			</div>
		</div>
	</div>
<script type="module" src="js/product.js"></script>
<script type="text/javascript" src="js/button.js"></script>
</body>
</html>
