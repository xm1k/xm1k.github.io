<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale = 1.0, user-scalable = 0">
	<title>Webbby</title>
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/new.css">
	<link rel="icon" href="img/icon.png">
	<meta name="google" content="notranslate">
</head>
<body class="notranslate" oncontextmenu="return false;">
	<div class="main-block">
		<div class="nav">
			<div class="logo no-focus">
				<img src="img/icon.webp" alt="" class = 'logoimg'>
			</div>
			<div class="nav__title no-focus">
				Webbby
			</div>
		</div>
		<div class="clock" id="clock" style="justify-content: center;align-items: center;">
			<p id = 'time' style="">23:41:12</p>
		</div>
		<div class="java no-focus">
			<img src="https://i.pinimg.com/originals/b3/24/bc/b324bcf2fc6d0b189e63e881c2573a7b.jpg" alt="">
		</div>
		<div class="content">
			<audio src="sounds/sound.mp3"></audio>
			<div class="mails">
			</div>
			<div class="text">
				<input type="text" class="search">
			</div>
		</div>
	</div>
	<div class="chup no-focus" style="opacity: 0">
			<div class="linn no-focus"></div>
			<img src="img/spider.gif" alt="">
	</div>
	
	<script type="text/javascript" src="js/system.js"></script>	
</body>
</html>
